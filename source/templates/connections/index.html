<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redis UI — Connections</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'SF Pro Text', 'Inter', system-ui, sans-serif; }
  </style>
  <script>
    let connections = []

    async function loadConnections() {
      try {
        const res = await fetch('/api/v1/connections')
        const json = await res.json()
        connections = json.data || []
        renderSidebar()
        renderCards()
      } catch (e) {
        console.error('failed to load connections', e)
      }
    }

    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav')
      if (!connections.length) {
        nav.innerHTML = '<p class="px-3 py-2 text-[11px] text-[#8b949e]">No connections</p>'
        return
      }
      nav.innerHTML = connections.map(c => `
        <button onclick="openWorkspace('${c.id}')"
          class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-md hover:bg-[#1c2128] text-left group transition-colors">
          <span class="w-1.5 h-1.5 rounded-full bg-[#4b5563] shrink-0"></span>
          <div class="flex-1 min-w-0">
            <p class="text-[12px] font-medium text-gray-300 truncate">${escHtml(c.name)}</p>
            <p class="text-[10px] text-[#8b949e] truncate">${escHtml(c.addr)}</p>
          </div>
        </button>
      `).join('')
    }

    function renderCards() {
      const main = document.getElementById('cards-container')
      if (!connections.length) {
        main.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center gap-3 text-center py-16">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="text-[#4b5563]">
              <ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 5v5c0 1.657 4.03 3 9 3s9-1.343 9-3V5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 10v5c0 1.657 4.03 3 9 3s9-1.343 9-3v-5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <p class="text-[13px] text-[#8b949e]">No connections yet</p>
          </div>`
        return
      }
      main.innerHTML = connections.map(c => `
        <div class="flex items-center gap-3 bg-[#161b22] border border-[#21262d] rounded-lg px-3 md:px-4 py-3 hover:border-[#30363d] transition-colors group">
          <div class="w-8 h-8 rounded-md bg-[#1c2128] border border-[#21262d] flex items-center justify-center shrink-0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <ellipse cx="12" cy="5" rx="9" ry="3" stroke="#6b7280" stroke-width="1.5"/>
              <path d="M3 5v5c0 1.657 4.03 3 9 3s9-1.343 9-3V5" stroke="#6b7280" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[13px] font-semibold text-gray-100">${escHtml(c.name)}</p>
            <p class="text-[11px] text-[#8b949e] mt-0.5 truncate">${escHtml(c.addr)} · DB ${c.db}</p>
          </div>
          <button onclick="openWorkspace('${c.id}')"
            class="flex items-center gap-1.5 bg-red-700 hover:bg-red-600 active:bg-red-800 text-white text-[11px] font-medium px-2 md:px-3 py-1.5 rounded-md transition-colors shrink-0">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span class="hidden md:inline">Connect</span>
          </button>
        </div>
      `).join('')
    }

    function openWorkspace(id) {
      window.location.href = '/workspace/' + id
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    window.addEventListener('DOMContentLoaded', loadConnections)
  </script>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen flex flex-col">

  <!-- Titlebar -->
  <header class="h-12 border-b border-[#21262d] px-5 flex items-center gap-3 shrink-0">
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="5" rx="9" ry="3" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M3 5v5c0 1.657 4.03 3 9 3s9-1.343 9-3V5" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M3 10v5c0 1.657 4.03 3 9 3s9-1.343 9-3v-5" stroke="#ef4444" stroke-width="1.5"/>
      </svg>
      <span class="text-[13px] font-semibold text-gray-200 tracking-tight">Redis UI</span>
    </div>
    <div class="flex-1"></div>
  </header>

  <!-- Body -->
  <div class="flex flex-1">

    <!-- Sidebar -->
    <aside class="hidden md:flex w-52 border-r border-[#21262d] bg-[#161b22] flex-col pt-3 shrink-0">
      <div class="px-3 mb-2 flex items-center justify-between">
        <span class="text-[10px] font-semibold uppercase tracking-widest text-[#8b949e]">Connections</span>
      </div>
      <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-1.5 space-y-0.5">
        <p class="px-3 py-2 text-[11px] text-[#8b949e]">Loading...</p>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col">
      <div class="h-10 border-b border-[#21262d] px-5 flex items-center gap-3">
        <span class="text-[12px] font-medium text-gray-300">Connections</span>
      </div>
      <div id="cards-container" class="flex-1 p-4 md:p-5 space-y-2 overflow-y-auto">
        <p class="text-[11px] text-[#8b949e]">Loading...</p>
      </div>
    </main>
  </div>

</body>
</html>
