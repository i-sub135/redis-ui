<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redis UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0f1117',
            panel: '#161b22',
            border: '#21262d',
            muted: '#8b949e',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'SF Pro Text', 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen flex flex-col">

  <!-- Titlebar -->
  <header class="h-12 border-b border-[#21262d] px-5 flex items-center gap-3 shrink-0">
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="5" rx="9" ry="3" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M3 5v5c0 1.657 4.03 3 9 3s9-1.343 9-3V5" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M3 10v5c0 1.657 4.03 3 9 3s9-1.343 9-3v-5" stroke="#ef4444" stroke-width="1.5"/>
      </svg>
      <span class="text-[13px] font-semibold text-gray-200 tracking-tight">Redis UI</span>
    </div>
    <div class="flex-1"></div>
    <button class="md:hidden inline-flex items-center gap-1 bg-red-600 hover:bg-red-500 text-white text-[11px] font-medium px-3 py-1.5 rounded-md transition-colors">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add
    </button>
    <span class="hidden md:block text-[11px] text-[#8b949e]">v0.1.0</span>
  </header>

  <!-- Body -->
  <div class="flex flex-1">

    <!-- Sidebar stub -->
    <aside class="hidden md:flex w-48 border-r border-[#21262d] bg-[#161b22] flex-col pt-3 shrink-0">
      <div class="px-3 mb-2">
        <span class="text-[10px] font-semibold uppercase tracking-widest text-[#8b949e]">Connections</span>
      </div>
      <div class="flex-1 flex items-center justify-center pb-10">
        <span class="text-[11px] text-[#8b949e] italic">None</span>
      </div>
      <div class="p-3 border-t border-[#21262d]">
        <button class="w-full flex items-center justify-center gap-1.5 bg-red-600 hover:bg-red-500 active:bg-red-700 text-white text-[12px] font-medium py-1.5 rounded-md transition-colors">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Add Connection
        </button>
      </div>
    </aside>

    <!-- Main area -->
    <main class="flex-1 flex flex-col items-center justify-center gap-5">
      <div class="flex flex-col items-center gap-3 select-none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" opacity="0.18">
          <ellipse cx="12" cy="5" rx="9" ry="3" stroke="#ef4444" stroke-width="1.5"/>
          <path d="M3 5v5c0 1.657 4.03 3 9 3s9-1.343 9-3V5" stroke="#ef4444" stroke-width="1.5"/>
          <path d="M3 10v5c0 1.657 4.03 3 9 3s9-1.343 9-3v-5" stroke="#ef4444" stroke-width="1.5"/>
        </svg>
        <div class="text-center">
          <p class="text-[14px] font-medium text-gray-300">No connections</p>
          <p class="text-[12px] text-[#8b949e] mt-1">Add a Redis connection to get started.</p>
        </div>
        <button class="mt-1 inline-flex items-center gap-1.5 bg-red-600 hover:bg-red-500 active:bg-red-700 text-white text-[12px] font-medium px-4 py-2 rounded-md transition-colors shadow-lg shadow-red-900/30">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Add Connection
        </button>
      </div>
    </main>

  </div>

</body>
</html>
