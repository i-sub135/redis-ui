<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redis UI — Workspace</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#ef4444">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'SF Pro Text', 'Inter', system-ui, sans-serif; }
    .key-item.active { background: #1f2937; }
    .tab-btn.active { color: #f87171; border-bottom: 2px solid #ef4444; }
    #key-list { transition: opacity 0.15s ease; }
    #key-list.loading { opacity: 0.4; pointer-events: none; }
  </style>
  <script>
    const connId = window.location.pathname.split('/')[2]
    let dbData = []
    let allKeys = []

    const TYPE_STYLE = {
      hash:   { label: 'hash', color: 'text-blue-400 bg-blue-900/30 border-blue-800/40' },
      string: { label: 'str',  color: 'text-purple-400 bg-purple-900/30 border-purple-800/40' },
      list:   { label: 'list', color: 'text-yellow-400 bg-yellow-900/30 border-yellow-800/40' },
      set:    { label: 'set',  color: 'text-green-400 bg-green-900/30 border-green-800/40' },
      zset:   { label: 'zset', color: 'text-orange-400 bg-orange-900/30 border-orange-800/40' },
      stream: { label: 'strm', color: 'text-red-400 bg-red-900/30 border-red-800/40' },
    }

    function renderKeys(keys) {
      const ul = document.getElementById('key-list')
      if (!keys.length) {
        ul.innerHTML = '<li class="px-3 py-4 text-[11px] text-[#8b949e] text-center">No keys</li>'
        return
      }
      ul.innerHTML = keys.map(k => {
        const s = TYPE_STYLE[k.type] || { label: k.type, color: 'text-gray-400 bg-gray-900/30 border-gray-700' }
        const isExpired = k.ttl === -2
        const isNearExpiry = k.ttl >= 0 && k.ttl < 3600
        const expiryIcon = (isExpired || isNearExpiry)
          ? `<span title="${isExpired ? 'Expired' : 'Expires in ' + k.ttl + 's'}"
               class="text-[9px] font-bold ${isExpired || k.ttl < 60 ? 'text-red-500 animate-pulse' : 'text-red-400'} shrink-0 leading-none">(!)</span>`
          : ''
        return `<li class="key-item">
          <button onclick="selectKey(this,'${k.key.replace(/'/g,"\\'")}','${k.type}')"
            class="w-full flex items-center gap-2.5 px-3 py-2 text-left hover:bg-[#1c2128] transition-colors">
            <span class="text-[9px] font-bold ${s.color} border px-1 py-0.5 rounded shrink-0 w-10 text-center">${s.label}</span>
            <span class="text-[11px] text-gray-300 truncate flex-1">${k.key}</span>
            ${expiryIcon}
          </button>
        </li>`
      }).join('')
    }

    async function loadKeys(db) {
      const list = document.getElementById('key-list')
      const counter = document.getElementById('key-count')
      list.classList.add('loading')
      counter.textContent = '...'
      try {
        const res = await fetch(`/api/v1/workspace/${connId}/keys?db=${db}`)
        const json = await res.json()
        allKeys = (json.data || []).sort((a, b) => a.key.localeCompare(b.key))
        counter.textContent = allKeys.length + ' keys'
        renderKeys(allKeys)
      } catch (e) {
        counter.textContent = 'error'
        console.error('failed to load keys', e)
      } finally {
        list.classList.remove('loading')
      }
    }

    let activeDb = 0

    async function loadDbs() {
      try {
        const res = await fetch(`/api/v1/workspace/${connId}/dbs`)
        const json = await res.json()
        dbData = json.data || []
        renderDbPills(activeDb)
        loadKeys(activeDb)
      } catch (e) {
        console.error('failed to load dbs', e)
        renderDbPills(0)
        loadKeys(0)
      }
    }

    function renderDbPills(selected) {
      const container = document.getElementById('db-pills')
      const dbs = dbData.length ? dbData.map(d => d.db) : [0]
      container.innerHTML = dbs.map(db => {
        const active = db === selected
        return `<button onclick="onDbChange(${db})"
          class="text-[11px] px-2 py-0.5 rounded-md border transition-colors ${active
            ? 'bg-red-700 border-red-600 text-white font-semibold'
            : 'bg-[#161b22] border-[#21262d] text-[#8b949e] hover:text-gray-200 hover:border-[#30363d]'}">
          DB ${db}
        </button>`
      }).join('')
    }

    function onDbChange(db) {
      activeDb = parseInt(db)
      renderDbPills(activeDb)
      loadKeys(activeDb)
    }

    function filterKeys(q) {
      const filtered = q ? allKeys.filter(k => k.key.includes(q)) : allKeys
      renderKeys(filtered)
    }

    async function selectKey(btn, key, type) {
      document.querySelectorAll('.key-item button').forEach(b => b.classList.remove('bg-[#1f2937]'))
      btn.classList.add('bg-[#1f2937]')

      const db = activeDb
      const panel = document.getElementById('detail-panel')
      panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-[11px] text-[#8b949e]">Loading...</div>'

      // mobile: hide key list, show detail panel
      const isMobile = window.innerWidth < 768
      if (isMobile) {
        document.getElementById('key-panel').classList.add('hidden')
        panel.classList.remove('hidden')
        panel.classList.add('flex')
      }

      try {
        const res = await fetch(`/api/v1/workspace/${connId}/key-value?key=${encodeURIComponent(key)}&db=${db}`)
        const json = await res.json()
        renderDetail(json.data)
      } catch (e) {
        panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-[11px] text-red-400">Error loading value</div>'
      }
    }

    function backToKeys() {
      document.getElementById('key-panel').classList.remove('hidden')
      const panel = document.getElementById('detail-panel')
      panel.classList.add('hidden')
      panel.classList.remove('flex')
    }

    function syntaxHighlight(str) {
      const re = /("(?:\\u[0-9a-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g
      const out = []
      let last = 0, m
      while ((m = re.exec(str)) !== null) {
        out.push(escHtml(str.slice(last, m.index)))
        const tok = m[0]
        let cls = 'text-[#AE81FF]'
        if (tok[0] === '"') {
          cls = /:$/.test(tok) ? 'text-[#A6E22E]' : 'text-[#E6DB74]'
        } else if (tok === 'true' || tok === 'false') {
          cls = 'text-[#66D9EF]'
        } else if (tok === 'null') {
          cls = 'text-[#F92672]'
        }
        out.push(`<span class="${cls}">${escHtml(tok)}</span>`)
        last = m.index + tok.length
      }
      out.push(escHtml(str.slice(last)))
      return out.join('')
    }

    function tryPrettyJson(s) {
      try {
        const parsed = JSON.parse(s)
        if (typeof parsed === 'object' && parsed !== null)
          return JSON.stringify(deepParseJson(parsed), null, 2).replace(/\\n/g, '\n')
      } catch (_) {}
      return String(s).replace(/\\n/g, '\n')
    }

    function deepParseJson(val, depth = 0) {
      if (depth > 10) return val
      if (typeof val === 'string') {
        try {
          const p = JSON.parse(val)
          if (typeof p === 'object' && p !== null) return deepParseJson(p, depth + 1)
        } catch (_) {}
        return val
      }
      if (Array.isArray(val)) return val.map(v => deepParseJson(v, depth + 1))
      if (typeof val === 'object' && val !== null) {
        const out = {}
        for (const [k, v] of Object.entries(val)) out[k] = deepParseJson(v, depth + 1)
        return out
      }
      return val
    }

    function renderDetail(d) {
      const panel = document.getElementById('detail-panel')
      const ttlLabel = formatTTL(d.ttl)
      const typeColor = (TYPE_STYLE[d.type] || {color:'text-gray-400 bg-gray-900/30 border-gray-700'}).color

      let valueHtml = ''
      if (d.type === 'string') {
        valueHtml = `<pre class="px-5 py-3 text-[11px] font-mono text-gray-300 whitespace-pre-wrap break-all">${syntaxHighlight(tryPrettyJson(String(d.value)))}</pre>`
      } else if (d.type === 'hash') {
        const rows = Object.entries(d.value || {}).map(([f,v]) =>
          `<tr class="border-b border-[#21262d] hover:bg-[#161b22]">
            <td class="px-5 py-2 font-mono text-blue-300 w-1/3 align-top">${escHtml(f)}</td>
            <td class="px-5 py-2 font-mono text-gray-300 break-all"><pre class="whitespace-pre-wrap">${syntaxHighlight(tryPrettyJson(String(v)))}</pre></td>
          </tr>`).join('')
        valueHtml = `<table class="w-full text-[11px]"><thead><tr class="border-b border-[#21262d] text-[#8b949e]"><th class="text-left px-5 py-2 font-medium w-1/3">Field</th><th class="text-left px-5 py-2 font-medium">Value</th></tr></thead><tbody>${rows}</tbody></table>`
      } else if (d.type === 'list') {
        const rows = (d.value || []).map((v, i) =>
          `<tr class="border-b border-[#21262d] hover:bg-[#161b22]">
            <td class="px-5 py-2 text-[#8b949e] w-12 align-top">${i}</td>
            <td class="px-5 py-2 font-mono text-gray-300 break-all"><pre class="whitespace-pre-wrap">${syntaxHighlight(tryPrettyJson(String(v)))}</pre></td>
          </tr>`).join('')
        valueHtml = `<table class="w-full text-[11px]"><thead><tr class="border-b border-[#21262d] text-[#8b949e]"><th class="text-left px-5 py-2 font-medium w-12">#</th><th class="text-left px-5 py-2 font-medium">Value</th></tr></thead><tbody>${rows}</tbody></table>`
      } else if (d.type === 'set') {
        const rows = (d.value || []).map(v =>
          `<tr class="border-b border-[#21262d] hover:bg-[#161b22]"><td class="px-5 py-2 font-mono text-gray-300 break-all"><pre class="whitespace-pre-wrap">${syntaxHighlight(tryPrettyJson(String(v)))}</pre></td></tr>`).join('')
        valueHtml = `<table class="w-full text-[11px]"><thead><tr class="border-b border-[#21262d] text-[#8b949e]"><th class="text-left px-5 py-2 font-medium">Member</th></tr></thead><tbody>${rows}</tbody></table>`
      } else if (d.type === 'zset') {
        const rows = (d.value || []).map(z =>
          `<tr class="border-b border-[#21262d] hover:bg-[#161b22]">
            <td class="px-5 py-2 font-mono text-gray-300 break-all">${escHtml(z.Member)}</td>
            <td class="px-5 py-2 text-orange-300 text-right w-24">${z.Score}</td>
          </tr>`).join('')
        valueHtml = `<table class="w-full text-[11px]"><thead><tr class="border-b border-[#21262d] text-[#8b949e]"><th class="text-left px-5 py-2 font-medium">Member</th><th class="text-right px-5 py-2 font-medium w-24">Score</th></tr></thead><tbody>${rows}</tbody></table>`
      } else if (d.type === 'stream') {
        const rows = (d.value || []).map(e =>
          `<tr class="border-b border-[#21262d] hover:bg-[#161b22]">
            <td class="px-5 py-2 font-mono text-[#8b949e] text-[10px] shrink-0">${escHtml(e.ID)}</td>
            <td class="px-5 py-2 font-mono text-gray-300 text-[10px] break-all"><pre class="whitespace-pre-wrap">${syntaxHighlight(JSON.stringify(deepParseJson(e.Values), null, 2).replace(/\\n/g, '\n'))}</pre></td>
          </tr>`).join('')
        valueHtml = `<table class="w-full text-[11px]"><thead><tr class="border-b border-[#21262d] text-[#8b949e]"><th class="text-left px-5 py-2 font-medium">ID</th><th class="text-left px-5 py-2 font-medium">Values</th></tr></thead><tbody>${rows}</tbody></table>`
      } else {
        valueHtml = `<div class="px-5 py-3 text-[11px] text-[#8b949e]">Unsupported type: ${escHtml(d.type)}</div>`
      }

      panel.innerHTML = `
        <div class="shrink-0 bg-[#0f1117] px-4 py-3 border-b border-[#21262d] flex flex-wrap items-center gap-x-4 gap-y-1">
          <button onclick="backToKeys()" class="md:hidden mr-1 text-[#8b949e] hover:text-gray-200 transition-colors shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="text-[13px] font-semibold text-gray-100 font-mono break-all">${escHtml(d.key)}</span>
          <div class="flex items-center gap-3 ml-auto">
            <span class="text-[10px] font-bold ${typeColor} border px-1.5 py-0.5 rounded">${d.type}</span>
            <span class="text-[11px] text-[#8b949e]">TTL: <span class="text-yellow-400">${ttlLabel}</span></span>
            <button onclick="reloadDetail('${d.key.replace(/'/g, "\\'")}')"
              title="Refresh value" class="text-[#4b5563] hover:text-gray-300 transition-colors px-1 py-1">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
              </svg>
            </button>
            <button onclick="deleteKey('${d.key.replace(/'/g, "\\'")}')"
              class="text-[11px] text-red-400 hover:text-red-300 hover:bg-red-900/20 px-2 py-1 rounded transition-colors">
              Delete
            </button>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto pb-16">${valueHtml}</div>`
    }

    async function deleteKey(key) {
      if (!confirm(`Delete key "${key}"?`)) return
      const db = activeDb
      try {
        const res = await fetch(`/api/v1/workspace/${connId}/key-value?key=${encodeURIComponent(key)}&db=${db}`, { method: 'DELETE' })
        if (res.status === 204) {
          const panel = document.getElementById('detail-panel')
          panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-[11px] text-[#8b949e]">Key deleted</div>'
          if (window.innerWidth < 768) backToKeys()
          loadKeys(db)
        }
      } catch (e) {
        alert('Delete failed')
      }
    }

    async function reloadDetail(key) {
      const panel = document.getElementById('detail-panel')
      panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-[11px] text-[#8b949e]">Loading...</div>'
      try {
        const res = await fetch(`/api/v1/workspace/${connId}/key-value?key=${encodeURIComponent(key)}&db=${activeDb}`)
        const json = await res.json()
        renderDetail(json.data)
      } catch (e) {
        panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-[11px] text-red-400">Error loading value</div>'
      }
    }

    function formatTTL(sec) {
      if (sec < 0) return 'no expiry'
      if (sec === 0) return 'expired'
      const d = Math.floor(sec / 86400)
      const h = Math.floor((sec % 86400) / 3600)
      const m = Math.floor((sec % 3600) / 60)
      const s = sec % 60
      const parts = []
      if (d) parts.push(d + 'd')
      if (h) parts.push(h + 'h')
      if (m) parts.push(m + 'm')
      if (!d && s) parts.push(s + 's')
      return parts.join(' ') || '0s'
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    async function loadConnName() {
      try {
        const res = await fetch('/api/v1/connections')
        const json = await res.json()
        const conn = (json.data || []).find(c => c.id === connId)
        if (conn) {
          document.getElementById('conn-name').textContent = conn.name
          document.getElementById('conn-addr').textContent = conn.addr
        }
      } catch (_) {}
    }

    window.addEventListener('DOMContentLoaded', () => { loadConnName(); loadDbs() })
  </script>
</head>
<body class="bg-[#0f1117] text-gray-100 h-screen overflow-hidden flex flex-col">

  <!-- Titlebar -->
  <header class="sticky top-0 z-10 h-12 border-b border-[#21262d] bg-[#0f1117] px-4 flex items-center gap-3 shrink-0">
    <!-- Back button -->
    <a href="/" class="inline-flex items-center gap-1.5 text-[11px] text-[#8b949e] hover:text-gray-200 transition-colors shrink-0">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      <span class="hidden sm:inline">Connections</span>
    </a>

    <div class="w-px h-4 bg-[#21262d] shrink-0"></div>

    <!-- Connection name -->
    <div class="flex items-center gap-1.5 shrink-0">
      <span class="w-1.5 h-1.5 rounded-full bg-green-400 shrink-0"></span>
      <span id="conn-name" class="text-[13px] font-semibold text-gray-200">—</span>
      <span id="conn-addr" class="hidden sm:inline text-[10px] text-[#8b949e]"></span>
    </div>

    <div class="flex-1"></div>

    <!-- DB Pills -->
    <div id="db-pills" class="flex items-center gap-1">
      <button onclick="onDbChange(0)" class="text-[11px] px-2 py-0.5 rounded-md border bg-red-700 border-red-600 text-white font-semibold">DB 0</button>
    </div>
  </header>

  <!-- Body: split panel -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left panel: Key List (full width on mobile, fixed width on desktop) -->
    <aside id="key-panel" class="w-full md:w-64 border-r border-[#21262d] bg-[#0f1117] flex flex-col shrink-0 md:shrink-0">

      <!-- Search -->
      <div class="p-2.5 border-b border-[#21262d]">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[#8b949e]" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input
            type="text"
            placeholder="Search keys..."
            oninput="filterKeys(this.value)"
            class="w-full bg-[#161b22] border border-[#21262d] rounded-md pl-7 pr-3 py-1.5 text-[11px] text-gray-300 placeholder-[#8b949e] focus:outline-none focus:border-[#30363d]"
          />
        </div>
      </div>

      <!-- Key count -->
      <div class="px-3 py-1.5 border-b border-[#21262d] flex items-center justify-between">
        <div class="flex items-center gap-1.5">
          <span id="key-count" class="text-[10px] text-[#8b949e]">128 keys</span>
          <button onclick="loadKeys(activeDb)"
            title="Refresh keys"
            class="text-[#4b5563] hover:text-gray-300 transition-colors">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
        </div>
        <span class="text-[10px] text-[#8b949e]">localhost:6379</span>
      </div>

      <!-- Key list (populated by JS) -->
      <ul id="key-list" class="flex-1 overflow-y-auto py-1 pb-16">
        <li class="px-3 py-4 text-[11px] text-[#8b949e] text-center">Loading...</li>
      </ul>
    </aside>

    <!-- Right panel: Key Detail -->
    <main id="detail-panel" class="hidden md:flex flex-1 flex-col">
      <div class="flex-1 flex items-center justify-center text-[11px] text-[#8b949e]">
        Select a key to view its value
      </div>
    </main>
  </div>

</body>
</html>
